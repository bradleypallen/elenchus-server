site_name: Elenchus
site_url: https://bradleypallen.github.io/elenchus-server/
repo_url: https://github.com/bradleypallen/elenchus-server
repo_name: bradleypallen/elenchus-server

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Motivation: motivation.md
  - User Guide: guide.md
  - Administration: administration.md
  - Running a Study: study.md
  - Deployment:
      - Overview: deployment.md
      - Operations Runbook: OPERATIONS.md
      - Cloud Deployment: cloud-deployment.md
  - Architecture: architecture.md
  - Reference:
      - ARDS Study (example design): ards-study-design.md
      - EEQ Review Packet: eeq-review.md
      - Session API Migration: session-api-migration.md

markdown_extensions:
  - tables
  - fenced_code
  - codehilite
