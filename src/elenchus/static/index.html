            marginTop: 8, padding: 10, borderRadius: 4,
            background: 'var(--surface2)', border: '1px dashed var(--commit-border)',
            fontSize: fs(11), fontFamily: 'var(--mono)', color: 'var(--text-dim)',
            wordBreak: 'break-all',
          }}>
            <div style={{ color: 'var(--commit)', fontSize: fs(10), letterSpacing: 1, marginBottom: 4 }}>
              ISSUED — share this link with {lastIssued.intended_email || 'recipient'}:
            </div>
            <div>{inviteUrl(lastIssued.token)}</div>
          </div>
        )}
      </div>

      {/* List */}
      <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 8 }}>
        ALL INVITES ({invites.length})
      </div>
      {loading ? (
        <div style={{ color: 'var(--text-muted)', fontSize: fs(11) }}>…</div>
      ) : invites.length === 0 ? (
        <div style={{ color: 'var(--text-muted)', fontSize: fs(11), fontFamily: 'var(--sans)' }}>
          No invites yet.
        </div>
      ) : (
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: fs(11) }}>
          <thead>
            <tr style={{ color: 'var(--text-muted)', textAlign: 'left' }}>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>role</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>recipient</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>status</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}></th>
            </tr>
          </thead>
          <tbody>
            {invites.map(inv => {
              const status = inv.consumed_at ? 'consumed'
                : (inv.expires_at && new Date(inv.expires_at) < new Date()) ? 'expired'
                : 'open';
              const color = status === 'open' ? 'var(--commit)'
                : status === 'consumed' ? 'var(--text-muted)'
                : 'var(--deny)';
              return (
                <tr key={inv.token} style={{ borderTop: '1px solid var(--border)' }}>
                  <td style={{ padding: '8px', fontFamily: 'var(--sans)' }}>{inv.role}</td>
                  <td style={{ padding: '8px', fontFamily: 'var(--sans)' }}>
                    {inv.intended_email || <span style={{ color: 'var(--text-muted)' }}>—</span>}
                  </td>
                  <td style={{ padding: '8px', color, fontFamily: 'var(--sans)' }}>{status}</td>
                  <td style={{ padding: '8px', textAlign: 'right' }}>
                    {status === 'open' && (
                      <button onClick={() => revoke(inv.token)}
                        style={{
                          background: 'none', border: '1px solid var(--border)', borderRadius: 3,
                          color: 'var(--deny)', cursor: 'pointer',
                          fontSize: fs(10), padding: '2px 6px', fontFamily: 'var(--mono)',
                          letterSpacing: 1,
                        }}>REVOKE</button>
                    )}
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      )}

      {error && (
        <div style={{
          marginTop: 14, padding: 10, borderRadius: 6,
          background: '#ef444420', border: '1px solid #ef444440',
          color: '#ef4444', fontSize: fs(11), fontFamily: 'var(--sans)',
        }}>{error}</div>
      )}
    </div>
  );
}

function AdminUsersTab({ fs }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  useEffect(() => {
    (async () => {

  if (loading) return <div style={{ color: 'var(--text-muted)', fontSize: fs(11) }}>…</div>;

      <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 8 }}>
        USERS ({users.length})

      <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: fs(11) }}>
        <thead>
          <tr style={{ color: 'var(--text-muted)', textAlign: 'left' }}>
            <th style={{ padding: '6px 8px', fontWeight: 400 }}>kind</th>

              </td>

function AdminStudyTab({ fs }) {
  // Token issuance + cohort overview. Researchers issue one token per
  // (participant, condition); the same participant gets two tokens for
  // the within-subjects design.
  const [tokens, setTokens] = useState([]);
  const [reports, setReports] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [form, setForm] = useState({ study_id: '', condition: 'elenchus', display_name: '' });
  const [creating, setCreating] = useState(false);
  const [lastLink, setLastLink] = useState(null);
  const [exporting, setExporting] = useState(null);
  const [exportResult, setExportResult] = useState(null);

  const load = async () => {
    setLoading(true); setError(null);
    try {
      const [t, r] = await Promise.all([
        api('/api/admin/study/tokens'),
        api('/api/admin/study/reports'),
      ]);
      setTokens(t.tokens || []);
      setReports(r.reports || []);
    } catch (e) { setError(e.message); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const issue = async () => {
    if (!form.study_id.trim() || !form.display_name.trim() || creating) return;
    setCreating(true); setError(null);
    try {
      const res = await api('/api/admin/study/tokens', {
        method: 'POST', body: JSON.stringify(form),
      });
      setLastLink({
        url: `${window.location.origin}/?study=${encodeURIComponent(res.token)}`,
        condition: res.condition, name: form.display_name,
      });
      setForm(f => ({ ...f, display_name: '' }));
      await load();
    } catch (e) { setError(e.message); }
    setCreating(false);
  };

  const voidToken = async (token) => {
    if (!confirm('Void this token? The participant will not be able to use the link.')) return;
    try { await api(`/api/admin/study/tokens/${encodeURIComponent(token)}`, { method: 'DELETE' }); await load(); }
    catch (e) { setError(e.message); }
  };

  const genReport = async (sessionId) => {
    try {
      await api(`/api/study/session/${sessionId}/generate-report`, { method: 'POST' });
      await load();
    } catch (e) { setError(typeof e.message === 'string' ? e.message : 'Report generation failed'); }
  };

  const runExport = async (studyId) => {
    setExporting(studyId); setError(null); setExportResult(null);
    try {
      const res = await api(`/api/admin/study/${encodeURIComponent(studyId)}/export`, { method: 'POST' });
      setExportResult(res);
    } catch (e) { setError(e.message); }
    setExporting(null);
  };

  // sessions don't have their own list endpoint; derive the studies in play.
  const studies = [...new Set(tokens.map(t => t.study_id))].sort();
  const reportBySession = {};
  reports.forEach(r => { reportBySession[r.session_id] = r; });

  const stColor = (status) => ({
    scheduled: 'var(--tension)', active: 'var(--commit)',
    complete: 'var(--text-muted)', voided: 'var(--deny)', expired: 'var(--deny)',
  }[status] || 'var(--text-dim)');

  return (
    <div>
      {/* Issue form */}
      <div style={{ marginBottom: 24, padding: 16, borderRadius: 6,
                    background: 'var(--surface)', border: '1px solid var(--border)' }}>
        <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 10 }}>
          ISSUE PARTICIPANT TOKEN
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
          <input value={form.study_id} onChange={e => setForm(f => ({ ...f, study_id: e.target.value }))}
            placeholder="study id (e.g. PILOT)" style={{
              flex: '1 1 140px', padding: '8px 10px', background: 'var(--surface2)',
              border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text)',
              fontSize: fs(12), fontFamily: 'var(--sans)', outline: 'none' }} />
          <select value={form.condition} onChange={e => setForm(f => ({ ...f, condition: e.target.value }))}
            style={{ padding: '8px 10px', background: 'var(--surface2)', border: '1px solid var(--border)',
              borderRadius: 4, color: 'var(--text)', fontSize: fs(12), fontFamily: 'var(--sans)' }}>
            <option value="elenchus">elenchus</option>
            <option value="baseline">baseline</option>
          </select>
          <input value={form.display_name} onChange={e => setForm(f => ({ ...f, display_name: e.target.value }))}
            placeholder="participant label (e.g. P-001)" style={{
              flex: '1 1 160px', padding: '8px 10px', background: 'var(--surface2)',
              border: '1px solid var(--border)', borderRadius: 4, color: 'var(--text)',
              fontSize: fs(12), fontFamily: 'var(--sans)', outline: 'none' }} />
          <button onClick={issue} disabled={creating} style={{
            padding: '8px 16px', background: 'var(--accent)', border: 'none', borderRadius: 4,
            color: '#111', fontSize: fs(11), letterSpacing: 1, fontWeight: 500,
            cursor: creating ? 'default' : 'pointer', opacity: creating ? 0.5 : 1 }}>
            {creating ? '…' : 'ISSUE'}</button>
        </div>
        {lastLink && (
          <div style={{ marginTop: 8, padding: 10, borderRadius: 4, background: 'var(--surface2)',
                        border: '1px dashed var(--commit-border)', fontSize: fs(11),
                        fontFamily: 'var(--mono)', color: 'var(--text-dim)', wordBreak: 'break-all' }}>
            <div style={{ color: 'var(--commit)', fontSize: fs(10), letterSpacing: 1, marginBottom: 4 }}>
              ISSUED ({lastLink.condition}) — send this link to {lastLink.name}:
            </div>
            <div>{lastLink.url}</div>
          </div>
        )}
      </div>

      {/* Export + tokens */}
      {studies.length > 0 && (
        <div style={{ marginBottom: 18 }}>
          <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 8 }}>
            STUDIES
          </div>
          {studies.map(sid => (
            <div key={sid} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
              <span style={{ fontFamily: 'var(--mono)', fontSize: fs(12) }}>{sid}</span>
              <span style={{ fontSize: fs(10), color: 'var(--text-muted)' }}>
                {tokens.filter(t => t.study_id === sid).length} tokens
              </span>
              <button onClick={() => runExport(sid)} disabled={exporting === sid} style={{
                background: 'none', border: '1px solid var(--border)', borderRadius: 3,
                color: 'var(--text-dim)', cursor: 'pointer', fontSize: fs(10),
                padding: '2px 8px', fontFamily: 'var(--mono)', letterSpacing: 1,
                opacity: exporting === sid ? 0.5 : 1 }}>
                {exporting === sid ? 'EXPORTING…' : 'EXPORT'}</button>
            </div>
          ))}
          {exportResult && (
            <div style={{ marginTop: 6, padding: 8, borderRadius: 4, background: 'var(--surface2)',
                          fontSize: fs(10), fontFamily: 'var(--mono)', color: 'var(--text-dim)', wordBreak: 'break-all' }}>
              archive: {exportResult.archive}<br/>
              {exportResult.sessions_exported.length} sessions, {exportResult.sessions_failed.length} failed
            </div>
          )}
        </div>
      )}

      <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 8 }}>
        TOKENS ({tokens.length})
      </div>
      {loading ? <div style={{ color: 'var(--text-muted)', fontSize: fs(11) }}>…</div>
       : tokens.length === 0 ? <div style={{ color: 'var(--text-muted)', fontSize: fs(11), fontFamily: 'var(--sans)' }}>No tokens issued yet.</div>
       : (
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: fs(11) }}>
          <thead>
            <tr style={{ color: 'var(--text-muted)', textAlign: 'left' }}>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>study</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>condition</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>status</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>session</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}>report</th>
              <th style={{ padding: '6px 8px', fontWeight: 400 }}></th>
            </tr>
          </thead>
          <tbody>
            {tokens.map(t => {
              const rep = t.session_id ? reportBySession[t.session_id] : null;
              return (
                <tr key={t.token} style={{ borderTop: '1px solid var(--border)' }}>

function SurveyRunner({ fs, sessionId, onDone }) {
  // Walks the participant through the four instruments sequentially.
  // Each instrument is submitted whole; the backend rejects partial
  // submissions, and the UI disables SUBMIT until every item has a
  // value.
  const [instruments, setInstruments] = useState(null);
  const [idx, setIdx] = useState(0);
  const [values, setValues] = useState({});
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const data = await api('/api/study/instruments');
        setInstruments(data.instruments);
      } catch (e) { setError(e.message); }
    })();
  }, []);

  if (error && !instruments) {
    return <StudyShell fs={fs} title="Questionnaires"><StudyError fs={fs} message={error} /></StudyShell>;
  }
  if (!instruments) {
    return <StudyShell fs={fs} title="Questionnaires">
      <p style={{ color: 'var(--text-muted)', fontFamily: 'var(--sans)', fontSize: fs(12) }}>Loading…</p>
    </StudyShell>;
  }

  const inst = instruments[idx];
  const allAnswered = inst.items.every(item => Number.isInteger(values[item.id]));

  const submit = async () => {
    if (!allAnswered || busy) return;
    setBusy(true); setError(null);
    try {
      await api(`/api/study/session/${sessionId}/survey`, {
        method: 'POST',
        body: JSON.stringify({ instrument: inst.instrument, responses: values }),
      });
      if (idx + 1 < instruments.length) {
        setIdx(idx + 1);
        setValues({});
        window.scrollTo(0, 0);
      } else {
        onDone();
      }
    } catch (e) {
      setError(typeof e.message === 'string' ? e.message : 'Submission failed — please review your answers.');
    }
    setBusy(false);
  };

  return (
    <div style={{ height: '100%', overflowY: 'auto' }}>
      <div style={{ maxWidth: 640, margin: '0 auto', padding: 48 }}>
        <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 6 }}>
          QUESTIONNAIRE {idx + 1} OF {instruments.length}
        </div>
        <h1 style={{ fontSize: fs(22), fontWeight: 300, marginBottom: 6 }}>{inst.title}</h1>
        <p style={{ color: 'var(--text-dim)', fontFamily: 'var(--sans)', fontSize: fs(12), marginBottom: 24 }}>
          {inst.description}
        </p>

        {inst.items.map(item => (
          <div key={item.id} style={{
            marginBottom: 18, padding: 14, borderRadius: 6,
            background: 'var(--surface)', border: '1px solid var(--border)',
          }}>
            <div style={{ fontFamily: 'var(--sans)', fontSize: fs(13), marginBottom: 10, lineHeight: 1.5 }}>
              {item.text}
            </div>
            {(item.scale_max - item.scale_min) > 10 ? (
              // Wide scale (NASA-TLX 0–100): slider + live value.
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <span style={{ fontSize: fs(10), color: 'var(--text-muted)', width: 70 }}>{inst.scale_labels.min}</span>
                <input
                  type="range" min={item.scale_min} max={item.scale_max} step={5}
                  value={values[item.id] ?? Math.round((item.scale_min + item.scale_max) / 2)}
                  onChange={e => setValues(v => ({ ...v, [item.id]: parseInt(e.target.value, 10) }))}
                  onMouseDown={() => setValues(v => (
                    Number.isInteger(v[item.id]) ? v : { ...v, [item.id]: Math.round((item.scale_min + item.scale_max) / 2) }
                  ))}
                  style={{ flex: 1 }}
                />
                <span style={{ fontSize: fs(10), color: 'var(--text-muted)', width: 70, textAlign: 'right' }}>{inst.scale_labels.max}</span>
                <span style={{
                  fontSize: fs(12), width: 36, textAlign: 'right',
                  color: Number.isInteger(values[item.id]) ? 'var(--text)' : 'var(--text-muted)',
                }}>{Number.isInteger(values[item.id]) ? values[item.id] : '—'}</span>
              </div>
            ) : (
              // Likert: one radio-style button per point.
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                <span style={{ fontSize: fs(10), color: 'var(--text-muted)', marginRight: 4 }}>{inst.scale_labels.min}</span>
                {Array.from({ length: item.scale_max - item.scale_min + 1 }, (_, i) => item.scale_min + i).map(n => (
                  <button key={n}
                    onClick={() => setValues(v => ({ ...v, [item.id]: n }))}
                    style={{
                      width: 34, height: 34, borderRadius: 17,
                      border: '1px solid ' + (values[item.id] === n ? 'var(--accent)' : 'var(--border)'),
                      background: values[item.id] === n ? 'var(--accent)' : 'var(--surface2)',
                      color: values[item.id] === n ? '#111' : 'var(--text-dim)',
                      cursor: 'pointer', fontSize: fs(12), fontFamily: 'var(--mono)',
                    }}>{n}</button>
                ))}
                <span style={{ fontSize: fs(10), color: 'var(--text-muted)', marginLeft: 4 }}>{inst.scale_labels.max}</span>
              </div>
            )}
          </div>
        ))}

        <button onClick={submit} disabled={!allAnswered || busy} style={{
          width: '100%', padding: '12px 16px', marginTop: 8, marginBottom: 40,
          background: allAnswered ? 'var(--accent)' : 'var(--surface)',
          border: 'none', borderRadius: 6, color: '#111',
          fontSize: fs(12), letterSpacing: 1, fontWeight: 500,
          cursor: (allAnswered && !busy) ? 'pointer' : 'default',
          opacity: (allAnswered && !busy) ? 1 : 0.3,
        }}>
          {busy ? '…' : (idx + 1 < instruments.length ? 'SUBMIT AND CONTINUE' : 'SUBMIT AND FINISH')}
        </button>
        {error && <StudyError fs={fs} message={error} />}
      </div>
    </div>
  );
}

// Quality dimensions presented to the judge. The backend stores
// whatever keys it's sent under `ratings`, so the dimension set lives
// here in the frontend and can evolve without a migration.

  { key: 'correctness', label: 'Correctness', help: 'Are the statements and rules accurate?' },

function JudgeQueue({ fs, onOpen }) {
  const [assignments, setAssignments] = useState(null);

  if (!assignments) return <div style={{ padding: 32, color: 'var(--text-muted)', fontSize: fs(12) }}>Loading…</div>;

  const pending = assignments.filter(a => a.status === 'pending');
  const done = assignments.filter(a => a.status !== 'pending');

  return (
    <div style={{ maxWidth: 720, margin: '0 auto', padding: 32 }}>
      <h1 style={{ fontSize: fs(22), fontWeight: 300, marginBottom: 6 }}>Your evaluation queue</h1>

            background: 'var(--surface)', border: '1px solid var(--border)', cursor: 'pointer' }}>
            <span style={{ fontFamily: 'var(--sans)', fontSize: fs(13) }}>Evaluation #{a.id}</span>
            <span style={{ fontSize: fs(10), letterSpacing: 1, fontFamily: 'var(--mono)', color: 'var(--accent)' }}>OPEN →</span>

  const [data, setData] = useState(null);
  const [error, setError] = useState(null);
  const [busy, setBusy] = useState(false);
  // form state
  const [ratings, setRatings] = useState({}); // {dim: {a, b}}
  const [justA, setJustA] = useState('');
  const [justB, setJustB] = useState('');
  const [winner, setWinner] = useState('');
  const [guessA, setGuessA] = useState('');
  const [guessB, setGuessB] = useState('');
  const [confidence, setConfidence] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const d = await api(`/api/judge/assignments/${assignmentId}`);
        setData(d);
        if (d.rating) {
          // Pre-fill from a prior submission (editable).
          setRatings(d.rating.ratings || {});
          setJustA(d.rating.justification_a || '');
          setJustB(d.rating.justification_b || '');
          setWinner(d.rating.pairwise_winner || '');
          setGuessA(d.rating.condition_guess_a || '');
          setGuessB(d.rating.condition_guess_b || '');
          setConfidence(d.rating.confidence ?? null);
        }
      } catch (e) { setError(e.message); }
    })();
  }, [assignmentId]);

  if (error && !data) return <div style={{ padding: 32 }}><StudyError fs={fs} message={error} /></div>;
  if (!data) return <div style={{ padding: 32, color: 'var(--text-muted)', fontSize: fs(12) }}>Loading…</div>;

  const setDim = (dim, slot, val) => setRatings(r => ({ ...r, [dim]: { ...(r[dim] || {}), [slot]: val } }));
  const allRated = JUDGE_DIMENSIONS.every(d => Number.isInteger(ratings[d.key]?.a) && Number.isInteger(ratings[d.key]?.b));
  const canSubmit = allRated && (winner === 'a' || winner === 'b' || winner === 'tie') && !busy;

  const submit = async () => {
    if (!canSubmit) return;
    setBusy(true); setError(null);
    try {
      await api(`/api/judge/assignments/${assignmentId}/rate`, {
        method: 'POST',
        body: JSON.stringify({
          ratings,
          justification_a: justA,
          justification_b: justB,
          pairwise_winner: winner,
          condition_guess_a: guessA || null,
          condition_guess_b: guessB || null,
          confidence: confidence ?? null,
        }),
      });
      onDone();
    } catch (e) {
      setError(typeof e.message === 'string' ? e.message : 'Submission failed.');
    }
    setBusy(false);
  };

  const likert = (dim, slot) => (
    <div style={{ display: 'flex', gap: 4 }}>
      {[1,2,3,4,5,6,7].map(n => (
        <button key={n} onClick={() => setDim(dim, slot, n)} style={{
          width: 28, height: 28, borderRadius: 14,
          border: '1px solid ' + (ratings[dim]?.[slot] === n ? 'var(--accent)' : 'var(--border)'),
          background: ratings[dim]?.[slot] === n ? 'var(--accent)' : 'var(--surface2)',
          color: ratings[dim]?.[slot] === n ? '#111' : 'var(--text-dim)',
          cursor: 'pointer', fontSize: fs(11), fontFamily: 'var(--mono)' }}>{n}</button>
      ))}
    </div>
  );

  return (
    <div style={{ maxWidth: 1000, margin: '0 auto', padding: 32 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 16 }}>
        <h1 style={{ fontSize: fs(20), fontWeight: 300 }}>Evaluation #{assignmentId}</h1>
        <button onClick={onDone} style={{
          background: 'none', border: '1px solid var(--border)', borderRadius: 4,
          color: 'var(--text-muted)', cursor: 'pointer', fontSize: fs(10),
          padding: '2px 8px', fontFamily: 'var(--mono)', letterSpacing: 1 }}>← QUEUE</button>
      </div>

      {/* Side-by-side outputs */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 24 }}>
        {['a','b'].map(slot => (
          <div key={slot} style={{ border: '1px solid var(--border)', borderRadius: 8, overflow: 'hidden' }}>
            <div style={{ padding: '8px 14px', background: 'var(--surface2)', borderBottom: '1px solid var(--border)',
                          fontSize: fs(11), letterSpacing: 2, fontFamily: 'var(--mono)', color: 'var(--opp)' }}>
              OUTPUT {slot.toUpperCase()}
            </div>
            <div style={{ padding: 14, fontSize: fs(12), fontFamily: 'var(--sans)', lineHeight: 1.6,
                          whiteSpace: 'pre-wrap', maxHeight: 420, overflowY: 'auto' }}>
              {data[`slot_${slot}`].content}
            </div>
          </div>
        ))}
      </div>

      {/* Dimension ratings */}
      <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 10 }}>
        QUALITY RATINGS (1 = poor, 7 = excellent)
      </div>
      {JUDGE_DIMENSIONS.map(d => (
        <div key={d.key} style={{ marginBottom: 16, padding: 14, borderRadius: 6,
                                  background: 'var(--surface)', border: '1px solid var(--border)' }}>
          <div style={{ fontFamily: 'var(--sans)', fontSize: fs(13), marginBottom: 2 }}>{d.label}</div>
          <div style={{ fontFamily: 'var(--sans)', fontSize: fs(11), color: 'var(--text-muted)', marginBottom: 10 }}>{d.help}</div>
          <div style={{ display: 'flex', gap: 28, flexWrap: 'wrap' }}>
            <div><div style={{ fontSize: fs(10), color: 'var(--text-muted)', marginBottom: 5 }}>Output A</div>{likert(d.key, 'a')}</div>
            <div><div style={{ fontSize: fs(10), color: 'var(--text-muted)', marginBottom: 5 }}>Output B</div>{likert(d.key, 'b')}</div>
          </div>
        </div>
      ))}

      {/* Justifications */}
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
        {[['a', justA, setJustA], ['b', justB, setJustB]].map(([slot, val, set]) => (
          <div key={slot}>
            <div style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', marginBottom: 6 }}>
              JUSTIFICATION — OUTPUT {slot.toUpperCase()}
            </div>
            <textarea value={val} onChange={e => set(e.target.value)} rows={3} style={{
              width: '100%', padding: 10, background: 'var(--surface)', border: '1px solid var(--border)',
              borderRadius: 6, color: 'var(--text)', fontSize: fs(12), fontFamily: 'var(--sans)',
              outline: 'none', resize: 'vertical' }} />
          </div>
        ))}
      </div>

      {/* Pairwise winner */}
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', marginBottom: 6 }}>
          OVERALL — WHICH IS BETTER?
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {[['a','Output A'],['tie','About equal'],['b','Output B']].map(([v,label]) => (
            <button key={v} onClick={() => setWinner(v)} style={{
              padding: '8px 16px', borderRadius: 6,
              border: '1px solid ' + (winner === v ? 'var(--accent)' : 'var(--border)'),
              background: winner === v ? 'var(--accent)' : 'var(--surface)',
              color: winner === v ? '#111' : 'var(--text-dim)',
              cursor: 'pointer', fontSize: fs(12), fontFamily: 'var(--sans)' }}>{label}</button>
          ))}
        </div>
      </div>

      {/* Blinding-validation: condition guess + confidence (optional) */}
      <div style={{ marginBottom: 16, padding: 14, borderRadius: 6, background: 'var(--surface)', border: '1px solid var(--border)' }}>
        <div style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', marginBottom: 4 }}>
          OPTIONAL — IF YOU HAD TO GUESS
        </div>
        <div style={{ fontSize: fs(11), fontFamily: 'var(--sans)', color: 'var(--text-muted)', marginBottom: 10 }}>
          One output was produced through a structured back-and-forth dialogue; the other through free-form chat. Which do you think is which?
        </div>
        {[['A', guessA, setGuessA], ['B', guessB, setGuessB]].map(([label, val, set]) => (
          <div key={label} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6 }}>
            <span style={{ width: 70, fontSize: fs(11), fontFamily: 'var(--sans)' }}>Output {label}</span>
            {[['elenchus','dialogue'],['baseline','free-form'],['unsure','unsure']].map(([v,lbl]) => (
              <button key={v} onClick={() => set(val === v ? '' : v)} style={{
                padding: '4px 10px', borderRadius: 4,
                border: '1px solid ' + (val === v ? 'var(--accent)' : 'var(--border)'),
                background: val === v ? 'var(--accent)' : 'var(--surface2)',
                color: val === v ? '#111' : 'var(--text-dim)',
                cursor: 'pointer', fontSize: fs(11), fontFamily: 'var(--sans)' }}>{lbl}</button>
            ))}
          </div>
        ))}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8 }}>
          <span style={{ width: 70, fontSize: fs(11), fontFamily: 'var(--sans)' }}>Confidence</span>
          {[1,2,3,4,5,6,7].map(n => (
            <button key={n} onClick={() => setConfidence(confidence === n ? null : n)} style={{
              width: 26, height: 26, borderRadius: 13,
              border: '1px solid ' + (confidence === n ? 'var(--accent)' : 'var(--border)'),
              background: confidence === n ? 'var(--accent)' : 'var(--surface2)',
              color: confidence === n ? '#111' : 'var(--text-dim)',
              cursor: 'pointer', fontSize: fs(10), fontFamily: 'var(--mono)' }}>{n}</button>
          ))}
        </div>
      </div>

      <button onClick={submit} disabled={!canSubmit} style={{
        width: '100%', padding: '12px 16px', marginBottom: 40,
        background: canSubmit ? 'var(--accent)' : 'var(--surface)',
        border: 'none', borderRadius: 6, color: '#111',
        fontSize: fs(12), letterSpacing: 1, fontWeight: 500,
        cursor: canSubmit ? 'pointer' : 'default', opacity: canSubmit ? 1 : 0.3 }}>
        {busy ? '…' : (data.rating ? 'UPDATE EVALUATION' : 'SUBMIT EVALUATION')}
      </button>
      {error && <StudyError fs={fs} message={error} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate />);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
</body>
</html>
