<script>
  // Day mode is the default; dark is opt-in. Apply the light theme
  // synchronously before React so there's no flash for the default and
  // light cases. Dark-preferring users fall through to the :root dark
  // values below (also flash-free).
  (function() {
    try {
      var prefs = JSON.parse(localStorage.getItem('elenchus-display'));
      if (!prefs || prefs.theme !== 'dark') {
        var s = document.documentElement.style;
        s.setProperty('--bg', '#f5f5f7');
        s.setProperty('--surface', '#ffffff');
        s.setProperty('--surface2', '#eeeef2');
        s.setProperty('--border', '#d4d4dc');
        s.setProperty('--border-focus', '#b4b4c4');
        s.setProperty('--text', '#1a1a2e');
        s.setProperty('--text-dim', '#4a4a68');
        s.setProperty('--text-muted', '#8888a0');
        s.setProperty('--respondent-text', '#4a5568');
      }
    } catch(e) {}
  })();
</script>

<body>
<div id="root"></div>
<script type="text/babel">

const API = '';  // Same origin

const { useState, useEffect, useRef, useCallback } = React;

// ── Display preferences ──

const DEFAULT_DISPLAY = {
  theme: 'light',
  fontScale: 1.0,
  colors: {
    commit: '#3de0b0',
    deny: '#f472b6',
    tension: '#fcd34d',
    imp: '#7cb3fc',
    opp: '#c4b5fd',
  }
};

const THEMES = {
  dark: {
    '--bg': '#0a0a12', '--surface': '#12121e', '--surface2': '#1a1a28',
    '--border': '#2a2a42', '--border-focus': '#4a4a6a',
    '--text': '#e0e0f0', '--text-dim': '#a0a0b8', '--text-muted': '#6a6a82',
    '--contested': '#64748b', '--accent': '#818cf8',
    '--respondent-text': '#94a3b8',
  },
  light: {
    '--bg': '#f5f5f7', '--surface': '#ffffff', '--surface2': '#eeeef2',
    '--border': '#d4d4dc', '--border-focus': '#b4b4c4',
    '--text': '#1a1a2e', '--text-dim': '#4a4a68', '--text-muted': '#8888a0',
    '--contested': '#64748b', '--accent': '#818cf8',
    '--respondent-text': '#4a5568',
  }
};

const FONT_SCALES = [
  { label: 'S', value: 0.85 },
  { label: 'M', value: 1.0 },
  { label: 'L', value: 1.15 },
  { label: 'XL', value: 1.3 },
];

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function applyDisplayPrefs(prefs) {
  const root = document.documentElement;
  const theme = THEMES[prefs.theme] || THEMES.light;

  // Set theme structural CSS vars
  Object.entries(theme).forEach(([k, v]) => root.style.setProperty(k, v));

  // Set semantic color vars + derived alpha variants
  const colors = prefs.colors || DEFAULT_DISPLAY.colors;
  const alphas = { bg: 0.12, 'bg-strong': 0.30, border: 0.20 };
  Object.entries(colors).forEach(([key, hex]) => {
    root.style.setProperty(`--${key}`, hex);
    Object.entries(alphas).forEach(([suffix, a]) => {
      root.style.setProperty(`--${key}-${suffix}`, hexToRgba(hex, a));
    });
  });

  // Set body font size
  document.body.style.fontSize = `${12 * (prefs.fontScale || 1.0)}px`;

  console.log('[elenchus] Display prefs applied:', JSON.stringify(prefs));
}

// ── API helpers ──

async function api(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    credentials: 'same-origin',
    ...opts,
  });
  if (res.status === 401) {
    // Session expired or never authenticated. Notify the AuthGate so it
    // can swap to the login view; throw so callers don't see undefined.
    window.dispatchEvent(new CustomEvent('elenchus:unauthorized'));
    const err = await res.json().catch(() => ({ detail: 'Not authenticated' }));
    throw new Error(err.detail || 'Not authenticated');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    // The LLM-failure path returns a structured detail object:
    //   { category, attempts, user_message }
    // Render `user_message` verbatim and attach the category so callers
    // (e.g. the message bar) can style the error differently from a
    // generic backend exception.
    if (err.detail && typeof err.detail === 'object' && err.detail.user_message) {
      const e = new Error(err.detail.user_message);
      e.category = err.detail.category;
      e.attempts = err.detail.attempts;
      throw e;
    }
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

// ── Opponent response parsing ──
//
// Mirrors `src/elenchus/response_parsing.py`. The opponent stores its
// raw JSON envelope in `conversation.content`; when we load history
// into the dialogue pane we want to show only the `response` field,
// not the JSON. The LLM occasionally emits "prose preamble + JSON"
// (with or without a ```json fence), so a simple JSON.parse on the
// whole content can miss real responses and leave raw JSON in the UI.
// We try fence-strip + direct parse first, then walk braces (string-
// aware) to recover JSON embedded after a preamble.
function extractResponseText(content) {
  if (!content) return content;
  let clean = content.trim();

  // Strip a leading ```...``` fence.
  if (clean.startsWith('```')) {
    const nl = clean.indexOf('\n');
    clean = nl >= 0 ? clean.slice(nl + 1) : clean.slice(3);
    if (clean.endsWith('```')) clean = clean.slice(0, -3);
    clean = clean.trim();
  }

  // Strategy 1: direct parse.
  try {
    const parsed = JSON.parse(clean);
    if (parsed && typeof parsed.response === 'string' && parsed.response.trim()) {
      return parsed.response;
    }
  } catch (e) { /* fall through */ }

  // Strategy 2: walk braces to find the first balanced { ... } block.
  const start = clean.indexOf('{');
  if (start < 0) return content;
  let depth = 0, inStr = false, escape = false;
  for (let i = start; i < clean.length; i++) {
    const ch = clean[i];
    if (escape) { escape = false; continue; }
    if (ch === '\\') { escape = true; continue; }
    if (ch === '"') { inStr = !inStr; continue; }
    if (inStr) continue;
    if (ch === '{') depth++;
    else if (ch === '}') {
      depth--;
      if (depth === 0) {
        try {
          const parsed = JSON.parse(clean.slice(start, i + 1));
          if (parsed && typeof parsed.response === 'string' && parsed.response.trim()) {
            return parsed.response;
          }
        } catch (e) { /* fall through */ }
        break;
      }
    }
  }
  return content;
}

// ── Auth context ──
// Shared by AuthGate (provider) and App (consumer). Holds the current
// actor and a logout helper. Defaults to null while the gate is still
// determining whether the user is logged in.
const AuthContext = React.createContext(null);

// ── Auth UI ──
//
// Three small, deliberately stylistically-aligned forms: login, signup
// (consumes an invite token), and a magic-link request. They share an
// outer chrome (centered card with the ELENCHUS wordmark on top) so
// the user never feels like they've left the app.

function AuthShell({ children, footer, error }) {
  return (
    <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <div style={{ maxWidth: 420, width: '100%', padding: 48 }}>
        <div style={{ textAlign: 'center', marginBottom: 36 }}>
          <div style={{ fontSize: 11, letterSpacing: 8, color: 'var(--text-muted)', marginBottom: 16 }}>
            ἜΛΕΓΧΟΣ
          </div>
          <h1 style={{ fontSize: 28, fontWeight: 300, letterSpacing: -0.5 }}>Elenchus</h1>
        </div>
        {children}
        {error && (
          <div style={{ marginTop: 14, padding: 10, borderRadius: 6,
                        background: '#ef444420', border: '1px solid #ef444440',
                        color: '#ef4444', fontSize: 12, fontFamily: 'var(--sans)' }}>
            {error}
          </div>
        )}
        {footer && (
          <div style={{ marginTop: 20, textAlign: 'center', fontSize: 11,
                        color: 'var(--text-muted)', fontFamily: 'var(--sans)' }}>
            {footer}
          </div>
        )}
      </div>
    </div>
  );
}

const authInputStyle = {
  width: '100%', padding: '11px 13px', marginBottom: 10,
  background: 'var(--surface)', border: '1px solid var(--border)',
  borderRadius: 6, color: 'var(--text)', fontSize: 13, outline: 'none',
  fontFamily: 'var(--sans)',
};

const authButtonStyle = (enabled) => ({
  width: '100%', padding: '11px 16px',
  background: enabled ? 'var(--accent)' : 'var(--surface)',
  border: 'none', borderRadius: 6, color: '#111',
  fontSize: 12, cursor: enabled ? 'pointer' : 'default',
  letterSpacing: 1, fontWeight: 500, opacity: enabled ? 1 : 0.3,
});

const authLinkStyle = {
  background: 'none', border: 'none', color: 'var(--accent)',
  cursor: 'pointer', fontSize: 11, padding: '4px 6px',
  fontFamily: 'var(--sans)', textDecoration: 'underline',
};

function Login({ onAuthed, onSwitchSignup, onSwitchMagic }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const submit = async () => {
    if (!email || !password || busy) return;
    setBusy(true); setError(null);
    try {
      await api('/api/auth/login', {
        method: 'POST', body: JSON.stringify({ email, password }),
      });
      onAuthed();
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  return (
    <AuthShell
      error={error}
      footer={
        <>
          <button style={authLinkStyle} onClick={onSwitchMagic}>email me a login link</button>
          <span style={{ margin: '0 6px' }}>·</span>
          <button style={authLinkStyle} onClick={onSwitchSignup}>sign up with invite</button>
        </>
      }
    >
      <input
        type="email" value={email} onChange={e => setEmail(e.target.value)}
        placeholder="email" autoFocus style={authInputStyle}
      />
      <input
        type="password" value={password} onChange={e => setPassword(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') submit(); }}
        placeholder="password" style={authInputStyle}
      />
      <button onClick={submit} disabled={!email || !password || busy} style={authButtonStyle(!!(email && password) && !busy)}>
        {busy ? '…' : 'SIGN IN'}
      </button>
    </AuthShell>
  );
}

function Signup({ initialToken, onAuthed, onSwitchLogin }) {
  const [token, setToken] = useState(initialToken || '');
  const [displayName, setDisplayName] = useState('');
  const [password, setPassword] = useState('');
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState(null);

  const submit = async () => {
    if (!token || !displayName || !password || busy) return;
    setBusy(true); setError(null);
    try {
      await api('/api/auth/signup', {
        method: 'POST',
        body: JSON.stringify({ token, display_name: displayName, password }),
      });
      // Clean the ?token= from the URL so a refresh doesn't re-submit.
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, '', window.location.pathname);
      }
      onAuthed();
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  return (
    <AuthShell
      error={error}
      footer={
        <>
          have an account?{' '}
          <button style={authLinkStyle} onClick={onSwitchLogin}>sign in</button>
        </>
      }
    >
      <input
        value={token} onChange={e => setToken(e.target.value)}
        placeholder="invite token" style={authInputStyle}
        readOnly={!!initialToken}
      />
      <input
        value={displayName} onChange={e => setDisplayName(e.target.value)}
        placeholder="display name" autoFocus={!!initialToken} style={authInputStyle}
      />
      <input
        type="password" value={password} onChange={e => setPassword(e.target.value)}
        onKeyDown={e => { if (e.key === 'Enter') submit(); }}
        placeholder="choose a password" style={authInputStyle}
      />
      <button onClick={submit} disabled={!token || !displayName || !password || busy}
        style={authButtonStyle(!!(token && displayName && password) && !busy)}>
        {busy ? '…' : 'CREATE ACCOUNT'}
      </button>
    </AuthShell>
  );
}

function MagicLink({ onSwitchLogin }) {
  const [email, setEmail] = useState('');
  const [busy, setBusy] = useState(false);
  const [sent, setSent] = useState(false);
  const [error, setError] = useState(null);

  const submit = async () => {
    if (!email || busy) return;
    setBusy(true); setError(null);
    try {
      await api('/api/auth/magic-link', {
        method: 'POST', body: JSON.stringify({ email }),
      });
      setSent(true);
    } catch (e) { setError(e.message); }
    setBusy(false);
  };

  return (
    <AuthShell
      error={error}
      footer={
        <button style={authLinkStyle} onClick={onSwitchLogin}>back to sign in</button>
      }
    >
      {sent ? (
        <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--text-dim)',
                      fontFamily: 'var(--sans)', lineHeight: 1.6, padding: '20px 8px' }}>
          If <span style={{ color: 'var(--text)' }}>{email}</span> is registered, a magic link has been sent.
          Check your inbox.
        </div>
      ) : (
        <>
          <input
            type="email" value={email} onChange={e => setEmail(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submit(); }}
            placeholder="email" autoFocus style={authInputStyle}
          />
          <button onClick={submit} disabled={!email || busy}
            style={authButtonStyle(!!email && !busy)}>
            {busy ? '…' : 'SEND LINK'}
          </button>
        </>
      )}
    </AuthShell>
  );
}

function AuthGate() {
  // Resolution states: 'pending' (initial check in flight), 'login',
  // 'signup', 'magic', 'authed', 'study-error'.
  const [phase, setPhase] = useState('pending');
  const [actor, setActor] = useState(null);
  const [initialToken, setInitialToken] = useState(null);
  const [studyError, setStudyError] = useState(null);

  // On mount: check the URL for a study token (?study=) or invite
  // token (?token=), then fall back to an existing session.
  useEffect(() => {
    const url = new URL(window.location.href);
    const token = url.searchParams.get('token');
    const studyToken = url.searchParams.get('study');

    (async () => {
      // Study link takes precedence: consuming it issues a session
      // cookie for the participant actor in one step — no login.
      if (studyToken) {
        try {
          await api(`/api/study/${encodeURIComponent(studyToken)}`, { method: 'POST' });
          window.history.replaceState({}, '', window.location.pathname);
          const me = await api('/api/auth/me');
          setActor(me); setPhase('authed');
          return;
        } catch (e) {
          // Already-used links are fine if we still hold the cookie —
          // a participant refreshing the page lands here.
          try {
            const me = await api('/api/auth/me');
            window.history.replaceState({}, '', window.location.pathname);
            setActor(me); setPhase('authed');
            return;
          } catch (e2) {
            setStudyError(e.message || 'This study link cannot be used.');
            setPhase('study-error');
            return;
          }
        }
      }
      try {
        const me = await api('/api/auth/me');
        setActor(me); setPhase('authed');
      } catch (e) {
        if (token) {
          setInitialToken(token);
          setPhase('signup');
        } else {
          setPhase('login');
        }
      }
    })();

    // Any request that 401s while we believe we're authed kicks us back
    // to login. Don't wipe the in-flight initial check, though.
    const onUnauthorized = () => {
      setActor(null);
      setPhase((cur) => cur === 'pending' ? cur : 'login');
    };
    window.addEventListener('elenchus:unauthorized', onUnauthorized);
    return () => window.removeEventListener('elenchus:unauthorized', onUnauthorized);
  }, []);

  const onAuthed = async () => {
    try {
      const me = await api('/api/auth/me');
      setActor(me); setPhase('authed');
    } catch (e) {
      // Shouldn't happen — we just authed. Fall back to login.
      setPhase('login');
    }
  };

  const logout = async () => {
    try { await api('/api/auth/logout', { method: 'POST' }); } catch (e) {}
    setActor(null);
    setPhase('login');
  };

  if (phase === 'pending') {
    return (
      <AuthShell>
        <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: 12 }}>
          …
        </div>
      </AuthShell>
    );
  }
  if (phase === 'login') {
    return <Login
      onAuthed={onAuthed}
      onSwitchSignup={() => setPhase('signup')}
      onSwitchMagic={() => setPhase('magic')}
    />;
  }
  if (phase === 'signup') {
    return <Signup
      initialToken={initialToken}
      onAuthed={onAuthed}
      onSwitchLogin={() => setPhase('login')}
    />;
  }
  if (phase === 'magic') {
    return <MagicLink onSwitchLogin={() => setPhase('login')} />;
  }
  if (phase === 'study-error') {
    return (
      <AuthShell error={studyError}>
        <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--text-dim)',
                      fontFamily: 'var(--sans)', lineHeight: 1.7, padding: '8px 4px' }}>
          This study link can't be used right now. If you believe this is a
          mistake, please contact the researcher who sent it to you.
        </div>
      </AuthShell>
    );
  }
  // Authed.
  return (
    <AuthContext.Provider value={{ actor, logout }}>
      <App />
    </AuthContext.Provider>
  );
}

// ── App ──

function App() {
  // Pulled from AuthGate's provider. Null only in the (impossible)
  // case that App renders outside the gate — bail safely if so.
  const authCtx = React.useContext(AuthContext) || { actor: null, logout: () => {} };
  const { actor, logout } = authCtx;

  const [view, setView] = useState('home'); // home | positum | dialogue
  const [dialectics, setDialectics] = useState([]);
  const [current, setCurrent] = useState(() => localStorage.getItem('elenchus-current') || null);
  const [state, setState] = useState(null);
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [newName, setNewName] = useState('');
  const [showSettings, setShowSettings] = useState(false);
  const [settings, setSettings] = useState({ model: '', base_url: '', has_api_key: false });
  const [settingsForm, setSettingsForm] = useState({ api_key: '', base_url: '', model: '' });
  const [settingsSaving, setSettingsSaving] = useState(false);
  const [pdfLoading, setPdfLoading] = useState(false);
  // ── Study flow (Sloan participants) ──
  // Non-null only for actors with kind='participant' and a live study
  // session. Drives the briefing → tutorial → active → post_session →
  // surveyed → complete routing.
  const [studySession, setStudySession] = useState(null);
  const [studyBusy, setStudyBusy] = useState(false);
  const isParticipant = actor?.kind === 'participant';
  const isBaseline = studySession?.condition === 'baseline';
  const [displayPrefs, setDisplayPrefs] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem('elenchus-display'));
      if (saved) {
        return { ...DEFAULT_DISPLAY, ...saved, colors: { ...DEFAULT_DISPLAY.colors, ...(saved.colors || {}) } };
      }
    } catch (e) {}
    return DEFAULT_DISPLAY;
  });
  const msgEnd = useRef(null);
  const inputRef = useRef(null);

  // ── Column resizing ──
  const [leftWidth, setLeftWidth] = useState(() => {
    try { const v = parseInt(localStorage.getItem('elenchus-left-w')); return v > 0 ? v : 260; } catch(e) { return 260; }
  });
  const [rightWidth, setRightWidth] = useState(() => {
    try { const v = parseInt(localStorage.getItem('elenchus-right-w')); return v > 0 ? v : 280; } catch(e) { return 280; }
  });
  // Side panes hidden by default; user toggles them via header buttons.
  const [leftVisible, setLeftVisible] = useState(() => {
    try { return localStorage.getItem('elenchus-left-visible') === '1'; } catch(e) { return false; }
  });
  const [rightVisible, setRightVisible] = useState(() => {
    try { return localStorage.getItem('elenchus-right-visible') === '1'; } catch(e) { return false; }
  });
  const dragging = useRef(null); // 'left' | 'right' | null

  useEffect(() => {
    const onMouseMove = (e) => {
      if (!dragging.current) return;
      e.preventDefault();
      if (dragging.current === 'left') {
        const w = Math.max(160, Math.min(e.clientX, window.innerWidth * 0.4));
        setLeftWidth(w);
      } else {
        const w = Math.max(160, Math.min(window.innerWidth - e.clientX, window.innerWidth * 0.4));
        setRightWidth(w);
      }
    };
    const onMouseUp = () => {
      if (dragging.current) {
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        dragging.current = null;
      }
    };
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    return () => { window.removeEventListener('mousemove', onMouseMove); window.removeEventListener('mouseup', onMouseUp); };
  }, []);

  useEffect(() => {
    if (current) localStorage.setItem('elenchus-current', current);
    else localStorage.removeItem('elenchus-current');
  }, [current]);
  useEffect(() => { localStorage.setItem('elenchus-left-w', leftWidth); }, [leftWidth]);
  useEffect(() => { localStorage.setItem('elenchus-right-w', rightWidth); }, [rightWidth]);
  useEffect(() => { localStorage.setItem('elenchus-left-visible', leftVisible ? '1' : '0'); }, [leftVisible]);
  useEffect(() => { localStorage.setItem('elenchus-right-visible', rightVisible ? '1' : '0'); }, [rightVisible]);

  const startDrag = (side) => (e) => {
    e.preventDefault();
    dragging.current = side;
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  };

  // Display preferences — persist and apply on every change (including initial)
  useEffect(() => {
    localStorage.setItem('elenchus-display', JSON.stringify(displayPrefs));
    applyDisplayPrefs(displayPrefs);
  }, [displayPrefs]);

  // Scaled font size helper
  const fs = useCallback((px) => Math.round(px * displayPrefs.fontScale), [displayPrefs.fontScale]);

  useEffect(() => {
    if (isParticipant) {
      // Participants are routed by their study session state, not by
      // localStorage restore (a shared machine could carry another
      // user's `elenchus-current`).
      refreshStudySession();
      return;
    }
    loadDialectics();
    loadSettings();
    // Restore last-open dialectic on refresh
    const saved = localStorage.getItem('elenchus-current');
    if (saved) openDialectic(saved).catch(() => {
      localStorage.removeItem('elenchus-current');
      setCurrent(null); setState(null); setView('home'); setError(null);
    });
  }, []);

  // ── Study flow actions ──

  const refreshStudySession = async () => {
    try {
      const s = await api('/api/study/session');
      setStudySession(s);
      // Tutorial/active sessions re-open their working base on refresh.
      if (s.state === 'tutorial') {
        await openDialectic(`practice-${s.id}`).catch(() => {});
      } else if (s.state === 'active' && s.base_id) {
        await openDialectic(s.base_id).catch(() => {});
      }
    } catch (e) {
      setStudySession(null); // participant with no live session
    }
  };

  const studyBeginTutorial = async () => {
    if (studyBusy) return;
    setStudyBusy(true); setError(null);
    try {
      const s = await api('/api/study/session/begin-tutorial', { method: 'POST' });
      setStudySession(s);
      await openDialectic(s.practice_base_id);
    } catch (e) { setError(e.message); }
    setStudyBusy(false);
  };

  const studyBeginTask = async () => {
    if (studyBusy) return;
    if (!confirm('Start the real task? The practice conversation will be left behind.')) return;
    setStudyBusy(true); setError(null);
    try {
      const s = await api('/api/study/session/begin-task', { method: 'POST' });
      setStudySession(s);
      setMessages([]); setState(null);
      await openDialectic(s.task_base_id);
    } catch (e) { setError(e.message); }
    setStudyBusy(false);
  };

  const studyAdvance = async (toState) => {
    if (studyBusy) return;
    setStudyBusy(true); setError(null);
    try {
      const s = await api('/api/study/session/advance', {
        method: 'POST', body: JSON.stringify({ to_state: toState }),
      });
      setStudySession(s);
      if (toState === 'post_session') { setCurrent(null); setState(null); }
    } catch (e) { setError(e.message); }
    setStudyBusy(false);
  };
  useEffect(() => { msgEnd.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);
  useEffect(() => { if (view !== 'home') inputRef.current?.focus(); }, [view, loading]);

  const loadDialectics = async () => {
    try { setDialectics(await api('/api/dialectics')); }
    catch (e) { /* server may not be running yet */ }
  };

  const loadSettings = async () => {
    try {
      const s = await api('/api/settings');
      setSettings(s);
      setSettingsForm({ api_key: '', base_url: s.base_url || '', model: s.model || '' });

      // Re-send locally saved model/base_url if server lost them (restart)
      try {
        const saved = JSON.parse(localStorage.getItem('elenchus-llm') || '{}');
        const needsSync = (saved.model && saved.model !== s.model)
                       || (saved.base_url && saved.base_url !== s.base_url);
        if (needsSync) {
          const body = {};
          if (saved.model) body.model = saved.model;
          if (saved.base_url) body.base_url = saved.base_url;
          const updated = await api('/api/settings', {
            method: 'PUT', body: JSON.stringify(body)
          });
          setSettings(updated);
          setSettingsForm(f => ({ ...f, base_url: updated.base_url || '', model: updated.model || '' }));
          console.log('[elenchus] Restored LLM settings from localStorage:', JSON.stringify(body));
        }
      } catch (e2) { /* localStorage read failed, no big deal */ }
    } catch (e) { /* server may not be running yet */ }
  };

  const openSettingsPanel = () => {
    setSettingsForm({ api_key: '', base_url: settings.base_url || '', model: settings.model || '' });
    setShowSettings(true);
  };

  const saveSettings = async () => {
    setSettingsSaving(true);
    try {
      const body = {};
      if (settingsForm.api_key) body.api_key = settingsForm.api_key;
      if (settingsForm.base_url !== undefined) body.base_url = settingsForm.base_url;
      if (settingsForm.model) body.model = settingsForm.model;
      const s = await api('/api/settings', {
        method: 'PUT', body: JSON.stringify(body)
      });
      setSettings(s);
      // Persist non-secret settings to localStorage for server restart recovery
      const llmLocal = {};
      if (s.model) llmLocal.model = s.model;
      if (s.base_url) llmLocal.base_url = s.base_url;
      localStorage.setItem('elenchus-llm', JSON.stringify(llmLocal));
      console.log('[elenchus] LLM settings saved to localStorage:', JSON.stringify(llmLocal));
      setShowSettings(false);
    } catch (e) { setError(e.message); }
    setSettingsSaving(false);
  };

  const createDialectic = async () => {
    const name = newName.trim();
    if (!name) return;
    try {
      const res = await api('/api/dialectics', {
        method: 'POST', body: JSON.stringify({ name, topic: name })
      });
      setCurrent(name);
      setState(res.state);
      setMessages([]);
      setView('positum');
      setNewName('');
      loadDialectics();
    } catch (e) { setError(e.message); }
  };

  const openDialectic = async (name) => {
    try {
      const s = await api(`/api/dialectics/${name}`);
      setCurrent(name);
      setState(s);
      // Restore conversation history from DB. Assistant messages are
      // stored as the raw LLM payload; extractResponseText pulls out
      // just the `response` field, tolerating prose preambles and
      // un-fenced JSON the same way opponent.py's parser does.
      const roleMap = { user: 'respondent', assistant: 'opponent' };
      const history = (s.conversation || []).map(m => {
        const content = m.role === 'assistant' ? extractResponseText(m.content) : m.content;
        return { role: roleMap[m.role] || m.role, content };
      });
      setMessages([
        { role: 'system', content: `Resumed dialectic: ${s.name}` },
        ...history,
      ]);
      setView('dialogue');
    } catch (e) { setError(e.message); }
  };

  const deleteDialectic = async (name) => {
    try {
      await api(`/api/dialectics/${name}`, { method: 'DELETE' });
      loadDialectics();
      if (current === name) { setCurrent(null); setState(null); setView('home'); }
    } catch (e) { setError(e.message); }
  };

  const sendMessage = async (msg) => {
    if (!msg?.trim() || loading) return;
    setInput('');
    setMessages(prev => [...prev, { role: 'respondent', content: msg }]);
    setLoading(true);
    setError(null);
    try {
      const res = await api(`/api/dialectics/${current}/message`, {
        method: 'POST', body: JSON.stringify({ message: msg })
      });
      setState(res.state);
      if (res.response) {
        setMessages(prev => [...prev, {
          role: 'opponent', content: res.response,
          acts: res.speech_acts, tensions: res.new_tensions
        }]);
      }
    } catch (e) {
      setError(e.message);
      setMessages(prev => [...prev, { role: 'error', content: e.message }]);
    }
    setLoading(false);
  };

  const submitPositum = async () => {
    const msg = input.trim();
    if (!msg || loading) return;
    setInput('');
    setView('dialogue');
    await sendMessage(msg);
  };

  const acceptTension = async (t) => {
    if (loading) return;
    try {
      const res = await api(`/api/dialectics/${current}/tensions/${t.id}`, {
        method: 'POST', body: JSON.stringify({ action: 'accept' })
      });
      setState(res.state);
      // Phase 2: notify opponent
      const followUp = `I accept tension T${t.id}.`;
      setMessages(prev => [...prev, { role: 'respondent', content: followUp }]);
      setLoading(true);
      setError(null);
      try {
        const oppRes = await api(`/api/dialectics/${current}/message`, {
          method: 'POST', body: JSON.stringify({ message: followUp, context: { action: 'accept', tension_id: t.id, gamma: t.gamma, delta: t.delta } })
        });
        setState(oppRes.state);
        if (oppRes.response) {
          setMessages(prev => [...prev, {
            role: 'opponent', content: oppRes.response,
            acts: oppRes.speech_acts, tensions: oppRes.new_tensions
          }]);
        }
      } catch (e2) {
        setError(e2.message);
        setMessages(prev => [...prev, { role: 'error', content: e2.message }]);
      }
      setLoading(false);
    } catch (e) { setError(e.message); }
  };

  const contestTension = async (t) => {
    if (loading) return;
    try {
      const res = await api(`/api/dialectics/${current}/tensions/${t.id}`, {
        method: 'POST', body: JSON.stringify({ action: 'contest' })
      });
      setState(res.state);
      // Phase 2: notify opponent
      const followUp = `I contest tension T${t.id}.`;
      setMessages(prev => [...prev, { role: 'respondent', content: followUp }]);
      setLoading(true);
      setError(null);
      try {
        const oppRes = await api(`/api/dialectics/${current}/message`, {
          method: 'POST', body: JSON.stringify({ message: followUp, context: { action: 'contest', tension_id: t.id, gamma: t.gamma, delta: t.delta } })
        });
        setState(oppRes.state);
        if (oppRes.response) {
          setMessages(prev => [...prev, {
            role: 'opponent', content: oppRes.response,
            acts: oppRes.speech_acts, tensions: oppRes.new_tensions
          }]);
        }
      } catch (e2) {
        setError(e2.message);
        setMessages(prev => [...prev, { role: 'error', content: e2.message }]);
      }
      setLoading(false);
    } catch (e) { setError(e.message); }
  };

  const retractProp = async (prop) => {
    if (loading) return;
    try {
      const res = await api(`/api/dialectics/${current}/retract`, {
        method: 'POST', body: JSON.stringify({ proposition: prop })
      });
      setState(res.state);
      // Phase 2: notify opponent
      const followUp = `I retract: "${prop}".`;
      setMessages(prev => [...prev, { role: 'respondent', content: `I retract: "${prop}".` }]);
      setLoading(true);
      setError(null);
      try {
        const oppRes = await api(`/api/dialectics/${current}/message`, {
          method: 'POST', body: JSON.stringify({ message: followUp })
        });
        setState(oppRes.state);
        if (oppRes.response) {
          setMessages(prev => [...prev, {
            role: 'opponent', content: oppRes.response,
            acts: oppRes.speech_acts, tensions: oppRes.new_tensions
          }]);
        }
      } catch (e2) {
        setError(e2.message);
        setMessages(prev => [...prev, { role: 'error', content: e2.message }]);
      }
      setLoading(false);
    } catch (e) { setError(e.message); }
  };

  const handleKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (view === 'positum') submitPositum();
      else sendMessage(input);
    }
  };

  // ── Settings modal (rendered in all views) ──
  const settingsModal = showSettings ? (
    <div style={{
      position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000,
    }} onClick={(e) => { if (e.target === e.currentTarget) setShowSettings(false); }}>
      <div style={{
        background: 'var(--surface)', border: '1px solid var(--border)',
        borderRadius: 10, padding: 28, width: 420, maxWidth: '90vw',
        maxHeight: '80vh', overflowY: 'auto',
      }}>
        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', textTransform: 'uppercase' }}>
            Settings
          </div>
          <button onClick={() => setShowSettings(false)} style={{
            background: 'none', border: 'none', color: 'var(--text-muted)',
            cursor: 'pointer', fontSize: fs(16), padding: '0 4px',
          }}>&times;</button>
        </div>

        {/* LLM section */}
        <div style={{ fontSize: fs(9), letterSpacing: 2, color: 'var(--text-dim)', marginBottom: 12, textTransform: 'uppercase' }}>
          LLM
        </div>

        <label style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>
          API KEY {settings.has_api_key && <span style={{ color: 'var(--commit)', fontSize: fs(9) }}>(set)</span>}
        </label>
        <input
          type="password"
          value={settingsForm.api_key}
          onChange={e => setSettingsForm(f => ({ ...f, api_key: e.target.value }))}
          placeholder={settings.has_api_key ? '••••••••  (leave blank to keep current)' : 'sk-ant-...'}
          style={{
            width: '100%', padding: '10px 12px', marginBottom: 14,
            background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 5,
            color: 'var(--text)', fontSize: fs(12), outline: 'none',
          }}
        />

        <label style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>
          API BASE URL
        </label>
        <input
          type="text"
          value={settingsForm.base_url}
          onChange={e => setSettingsForm(f => ({ ...f, base_url: e.target.value }))}
          placeholder="https://api.anthropic.com (default)"
          style={{
            width: '100%', padding: '10px 12px', marginBottom: 14,
            background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 5,
            color: 'var(--text)', fontSize: fs(12), outline: 'none',
          }}
        />

        <label style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', display: 'block', marginBottom: 4 }}>
          MODEL
        </label>
        <input
          type="text"
          value={settingsForm.model}
          onChange={e => setSettingsForm(f => ({ ...f, model: e.target.value }))}
          placeholder="claude-sonnet-4-20250514"
          style={{
            width: '100%', padding: '10px 12px', marginBottom: 20,
            background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 5,
            color: 'var(--text)', fontSize: fs(12), outline: 'none',
          }}
        />

        <button
          onClick={saveSettings}
          disabled={settingsSaving}
          style={{
            width: '100%', padding: '10px 0',
            background: settingsSaving ? 'var(--surface2)' : 'var(--accent)',
            border: 'none', borderRadius: 6, color: '#111',
            fontSize: fs(11), cursor: settingsSaving ? 'default' : 'pointer',
            letterSpacing: 1, fontWeight: 500,
            opacity: settingsSaving ? 0.5 : 1,
          }}
        >{settingsSaving ? 'SAVING...' : 'SAVE LLM SETTINGS'}</button>

        {/* Divider */}
        <div style={{ borderTop: '1px solid var(--border)', margin: '24px 0' }} />

        {/* Display section */}
        <div style={{ fontSize: fs(9), letterSpacing: 2, color: 'var(--text-dim)', marginBottom: 16, textTransform: 'uppercase' }}>
          Display
        </div>

        {/* Theme toggle */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', display: 'block', marginBottom: 6 }}>
            THEME
          </label>
          <div style={{ display: 'flex', borderRadius: 5, overflow: 'hidden', border: '1px solid var(--border)' }}>
            {['dark', 'light'].map(t => (
              <button key={t} onClick={() => setDisplayPrefs(p => ({ ...p, theme: t }))}
                style={{
                  flex: 1, padding: `${fs(6)}px ${fs(14)}px`, border: 'none', cursor: 'pointer',
                  background: displayPrefs.theme === t ? 'var(--accent)' : 'var(--surface2)',
                  color: displayPrefs.theme === t ? '#fff' : 'var(--text-dim)',
                  fontSize: fs(10), letterSpacing: 1, textTransform: 'uppercase',
                  fontFamily: 'var(--mono)',
                }}>{t}</button>
            ))}
          </div>
        </div>

        {/* Font size */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', display: 'block', marginBottom: 6 }}>
            FONT SIZE
          </label>
          <div style={{ display: 'flex', borderRadius: 5, overflow: 'hidden', border: '1px solid var(--border)' }}>
            {FONT_SCALES.map(sc => (
              <button key={sc.value} onClick={() => setDisplayPrefs(p => ({ ...p, fontScale: sc.value }))}
                style={{
                  flex: 1, padding: `${fs(6)}px 0`, border: 'none', cursor: 'pointer',
                  background: displayPrefs.fontScale === sc.value ? 'var(--accent)' : 'var(--surface2)',
                  color: displayPrefs.fontScale === sc.value ? '#fff' : 'var(--text-dim)',
                  fontSize: fs(10), letterSpacing: 1,
                  fontFamily: 'var(--mono)',
                }}>{sc.label}</button>
            ))}
          </div>
        </div>

        {/* Colors */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontSize: fs(10), letterSpacing: 1, color: 'var(--text-muted)', display: 'block', marginBottom: 8 }}>
            COLORS
          </label>
          {[
            { key: 'commit', label: 'Commitments' },
            { key: 'deny', label: 'Denials' },
            { key: 'tension', label: 'Tensions' },
            { key: 'imp', label: 'Implications' },
            { key: 'opp', label: 'Opponent' },
          ].map(({ key, label }) => (
            <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8 }}>
              <input type="color" value={displayPrefs.colors[key]}
                onChange={e => setDisplayPrefs(p => ({ ...p, colors: { ...p.colors, [key]: e.target.value } }))}
                style={{ width: 28, height: 28, border: '1px solid var(--border)', borderRadius: 4, padding: 1, cursor: 'pointer', background: 'var(--surface2)' }}
              />
              <span style={{ fontSize: fs(11), color: 'var(--text-dim)', fontFamily: 'var(--sans)' }}>{label}</span>
            </div>
          ))}
        </div>

        {/* Reset */}
        <button onClick={() => setDisplayPrefs(DEFAULT_DISPLAY)}
          style={{
            background: 'none', border: 'none', color: 'var(--text-muted)',
            cursor: 'pointer', fontSize: fs(10), textDecoration: 'underline',
            padding: 0, fontFamily: 'var(--mono)',
          }}>reset to defaults</button>
      </div>
    </div>
  ) : null;

  // ── Blinded judge interface ──
  // Judges have their own full-screen surface; they never see the
  // dialectic / home / admin chrome.
  if (actor?.kind === 'judge') {
    return <JudgeInterface fs={fs} logout={logout} />;
  }

  // ── Study flow (Sloan participants) ──
  // Full-screen states are intercepted here; tutorial/active fall
  // through to the regular dialogue view (with the study strip in
  // its header).
  if (isParticipant) {
    const sState = studySession?.state;
    if (!studySession) {
      return (
        <StudyShell fs={fs} title="No active session">
          <p style={{ color: 'var(--text-dim)', fontFamily: 'var(--sans)', fontSize: fs(13), lineHeight: 1.8 }}>
            You don't have an active study session. If you arrived here from a
            study link, the session may have ended — please contact the
            researcher who sent you the link.
          </p>
        </StudyShell>
      );
    }
    if (sState === 'briefing') {
      return (
        <StudyShell fs={fs} title="Welcome to the study">
          <div style={{ color: 'var(--text-dim)', fontFamily: 'var(--sans)', fontSize: fs(13), lineHeight: 1.8 }}>
            <p style={{ marginBottom: 12 }}>
              In this session you will work with an AI to develop a written
              specification of the key concepts and rules of a research domain.
              The session has four parts:
            </p>
            <ol style={{ paddingLeft: 22, marginBottom: 12 }}>
              <li style={{ marginBottom: 6 }}><b>Tutorial</b> (~15 minutes) — practice with the interface on a warm-up topic.</li>
              <li style={{ marginBottom: 6 }}><b>Main task</b> (~60 minutes) — work on the domain you were given.</li>
              <li style={{ marginBottom: 6 }}><b>Summary</b> — a short review of what you produced.</li>
              <li style={{ marginBottom: 6 }}><b>Questionnaires</b> (~10–15 minutes) — four short instruments about your experience.</li>
            </ol>
            <p style={{ marginBottom: 12 }}>
              Your work is recorded for research purposes. Your identity is
              held separately from the research data and is never published.
              You may stop at any time by closing this window and contacting
              the researcher.
            </p>
          </div>
          <button onClick={studyBeginTutorial} disabled={studyBusy} style={{
            width: '100%', padding: '12px 16px', marginTop: 12,
            background: 'var(--accent)', border: 'none', borderRadius: 6,
            color: '#111', fontSize: fs(12), letterSpacing: 1, fontWeight: 500,
            cursor: studyBusy ? 'default' : 'pointer', opacity: studyBusy ? 0.5 : 1,
          }}>{studyBusy ? '…' : 'BEGIN TUTORIAL'}</button>
          {error && <StudyError fs={fs} message={error} />}
        </StudyShell>
      );
    }
    if (sState === 'post_session') {
      return (
        <StudyShell fs={fs} title="Main task complete">
          <p style={{ color: 'var(--text-dim)', fontFamily: 'var(--sans)', fontSize: fs(13), lineHeight: 1.8, marginBottom: 12 }}>
            Thank you — the main task is finished and your work has been saved.
            The last step is a short set of questionnaires about your
            experience (about 10–15 minutes).
          </p>
          <button onClick={() => studyAdvance('surveyed')} disabled={studyBusy} style={{
            width: '100%', padding: '12px 16px', marginTop: 12,
            background: 'var(--accent)', border: 'none', borderRadius: 6,
            color: '#111', fontSize: fs(12), letterSpacing: 1, fontWeight: 500,
            cursor: studyBusy ? 'default' : 'pointer', opacity: studyBusy ? 0.5 : 1,
          }}>{studyBusy ? '…' : 'CONTINUE TO QUESTIONNAIRES'}</button>
          {error && <StudyError fs={fs} message={error} />}
        </StudyShell>
      );
    }
    if (sState === 'surveyed') {
      return (
        <SurveyRunner
          fs={fs}
          sessionId={studySession.id}
          onDone={() => studyAdvance('complete')}
        />
      );
    }
    if (sState === 'complete' || sState === 'expired' || sState === 'interrupted') {
      return (
        <StudyShell fs={fs} title={sState === 'complete' ? 'All done — thank you!' : 'Session ended'}>
          <p style={{ color: 'var(--text-dim)', fontFamily: 'var(--sans)', fontSize: fs(13), lineHeight: 1.8 }}>
            {sState === 'complete'
              ? 'Your session is complete and everything has been recorded. You can close this window.'
              : 'This session has ended. Please contact the researcher if you have questions.'}
          </p>
        </StudyShell>
      );
    }
    // tutorial / active fall through to the dialogue view below —
    // but never to the home screen (participants must not create or
    // browse arbitrary dialectics). While the working base is still
    // loading, show a holding screen.
    if (view !== 'dialogue') {
      return (
        <StudyShell fs={fs} title={sState === 'tutorial' ? 'Loading tutorial…' : 'Loading session…'}>
          <p style={{ color: 'var(--text-muted)', fontFamily: 'var(--sans)', fontSize: fs(12) }}>
            One moment.
          </p>
          {error && <StudyError fs={fs} message={error} />}
        </StudyShell>
      );
    }
  }

  // ── Home ──
  // ── Admin Dashboard ──
  if (view === 'admin') {
    if (actor?.kind !== 'admin') {
      // Defense in depth: non-admins shouldn't reach this; bounce home.
      setView('home');
      return null;
    }
    return <AdminDashboard fs={fs} onBack={() => setView('home')} />;
  }

  if (view === 'home') {
    return (
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {/* Top bar — account info + controls. Sits in document flow so
            it never overlaps the centered wordmark. */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'flex-end',
          gap: 8, padding: '12px 20px',
        }}>
          {actor && (
            <span title={actor.email || ''} style={{
              fontSize: fs(10), color: 'var(--text-muted)', fontFamily: 'var(--sans)',
            }}>
              {actor.display_name || actor.email}
              {actor.kind === 'admin' && (
                <span style={{ marginLeft: 4, color: 'var(--accent)' }}>·admin</span>
              )}
            </span>
          )}
          {actor && actor.kind === 'admin' && (
            <button
              onClick={() => setView('admin')}
              title="Admin dashboard"
              style={{
                background: 'none', border: '1px solid var(--accent)', borderRadius: 4,
                color: 'var(--accent)', cursor: 'pointer',
                fontSize: fs(10), padding: '2px 8px', lineHeight: 1.4,
                letterSpacing: 1, fontFamily: 'var(--mono)',
              }}
            >ADMIN</button>
          )}
          {actor && (
            <button
              onClick={logout}
              title="Sign out"
              style={{
                background: 'none', border: '1px solid var(--border)', borderRadius: 4,
                color: 'var(--text-muted)', cursor: 'pointer',
                fontSize: fs(10), padding: '2px 8px', lineHeight: 1.4,
                letterSpacing: 1, fontFamily: 'var(--mono)',
              }}
            >SIGN OUT</button>
          )}
          <button
            onClick={openSettingsPanel}
            title="Settings"
            style={{
              background: 'none', border: 'none', color: 'var(--text-muted)',
              cursor: 'pointer', fontSize: fs(18), padding: 4, lineHeight: 1,
            }}
          >&#9881;</button>
        </div>

        {/* Centered card */}
        <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ maxWidth: 560, width: '100%', padding: '0 48px 48px' }}>
          <div style={{ textAlign: 'center', marginBottom: 48 }}>
            <div style={{ fontSize: fs(11), letterSpacing: 8, color: 'var(--text-muted)', marginBottom: 16 }}>
              ἜΛΕΓΧΟΣ
            </div>
            <h1 style={{ fontSize: fs(32), fontWeight: 300, letterSpacing: -1, marginBottom: 8 }}>
              Elenchus
            </h1>
            <p style={{ color: 'var(--text-dim)', fontSize: fs(13), fontFamily: 'var(--sans)', lineHeight: 1.8 }}>
              Develop bilateral positions through prover-skeptic dialogue.
            </p>
          </div>

          {settingsModal}

          {/* New dialectic */}
          <div style={{ marginBottom: 32 }}>
            <label style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', display: 'block', marginBottom: 8 }}>
              NEW DIALECTIC
            </label>
            <div style={{ display: 'flex', gap: 8 }}>
              <input
                value={newName}
                onChange={e => setNewName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') createDialectic(); }}
                placeholder="Topic of inquiry..."
                style={{
                  flex: 1, padding: '12px 14px', background: 'var(--surface)',
                  border: '1px solid var(--border)', borderRadius: 6,
                  color: 'var(--text)', fontSize: fs(13), outline: 'none',
                  fontFamily: 'var(--sans)',
                }}
                autoFocus
              />
              <button
                onClick={createDialectic}
                disabled={!newName.trim()}
                style={{
                  padding: '12px 20px', background: newName.trim() ? 'var(--accent)' : 'var(--surface)',
                  border: 'none', borderRadius: 6, color: '#111',
                  fontSize: fs(12), cursor: newName.trim() ? 'pointer' : 'default',
                  letterSpacing: 1, fontWeight: 500,
                  opacity: newName.trim() ? 1 : 0.3,
                }}
              >BEGIN</button>
            </div>
          </div>

          {/* Existing dialectics */}
          {dialectics.length > 0 && (
            <div>
              <label style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', display: 'block', marginBottom: 8 }}>
                RESUME
              </label>
              {dialectics.map(d => (
                <div key={d.name} style={{
                  display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                  padding: '10px 14px', marginBottom: 4, borderRadius: 6,
                  background: 'var(--surface)', border: '1px solid var(--border)',
                  cursor: 'pointer',
                }} onClick={() => openDialectic(d.name)}>
                  <div>
                    <div style={{ fontSize: fs(13), fontFamily: 'var(--sans)', marginBottom: 2 }}>{d.topic}</div>
                    <div style={{ fontSize: fs(10), color: 'var(--text-muted)' }}>
                      C:{d.commitments} · D:{d.denials} · T:{d.tensions} · I:{d.implications}
                    </div>
                  </div>
                  <button onClick={e => { e.stopPropagation(); deleteDialectic(d.name); }}
                    style={{ background: 'none', border: 'none', color: 'var(--text-muted)',
                             cursor: 'pointer', fontSize: fs(11), padding: '4px 8px' }}>×</button>
                </div>
              ))}
            </div>
          )}

          {error && (
            <div style={{ marginTop: 16, padding: 12, borderRadius: 6,
                          background: '#ef444420', border: '1px solid #ef444440',
                          color: '#ef4444', fontSize: fs(12), fontFamily: 'var(--sans)' }}>
              {error}
            </div>
          )}
        </div>
        </div>
      </div>
    );
  }

  // ── Positum ──
  if (view === 'positum') {
    return (
      <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ maxWidth: 620, width: '100%', padding: 48 }}>
          <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 8 }}>
            POSITUM · {current}
          </div>
          <p style={{
            color: 'var(--text-dim)', fontSize: fs(14), fontFamily: 'var(--sans)',
            lineHeight: 1.8, marginBottom: 24,
          }}>
            State your initial position in your own words. The opponent will extract
            commitments and begin the dialectic.
          </p>
          <textarea
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter' && e.metaKey) submitPositum(); }}
            placeholder="State your position..."
            rows={8}
            style={{
              width: '100%', padding: 16, background: 'var(--surface)',
              border: '1px solid var(--border)', borderRadius: 6,
              color: 'var(--text)', fontSize: fs(14), outline: 'none', resize: 'vertical',
              fontFamily: 'var(--sans)', lineHeight: 1.7,
            }}
          />
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 12 }}>
            <span style={{ color: 'var(--text-muted)', fontSize: fs(11) }}>⌘+Enter to submit</span>
            <button
              onClick={submitPositum}
              disabled={!input.trim() || loading}
              style={{
                padding: '10px 24px',
                background: input.trim() && !loading ? 'var(--accent)' : 'var(--surface)',
                border: 'none', borderRadius: 6, color: '#111',
                fontSize: fs(12), cursor: input.trim() ? 'pointer' : 'default',
                letterSpacing: 1, opacity: input.trim() && !loading ? 1 : 0.3,
              }}
            >{loading ? 'THINKING...' : 'SUBMIT POSITUM'}</button>
          </div>
          {settingsModal}
        </div>
      </div>
    );
  }

  // ── Dialogue ──
  const s = state || { commitments: [], denials: [], tensions: [], queued_tensions: [], implications: [], retracted: [], contested: [], atom_ids: {} };
  const queuedTensions = s.queued_tensions || [];
  const openTensionCount = s.tensions.length + queuedTensions.length;
  const leftCount = s.commitments.length + s.denials.length;
  const rightCount = openTensionCount + s.implications.length;

  // Build grid template: omit hidden columns and their drag handles.
  const gridCols = [
    leftVisible ? `${leftWidth}px` : null,
    leftVisible ? '4px' : null,
    '1fr',
    rightVisible ? '4px' : null,
    rightVisible ? `${rightWidth}px` : null,
  ].filter(Boolean).join(' ');

  return (
    <div style={{ height: '100%', display: 'grid', gridTemplateColumns: gridCols, gridTemplateRows: 'auto 1fr auto' }}>
      {/* Header */}
      <div style={{
        gridColumn: '1 / -1', padding: '10px 20px',
        borderBottom: '1px solid var(--border)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 12 }}>
          <span style={{ fontSize: fs(13), fontWeight: 500, color: 'var(--opp)',
                         cursor: isParticipant ? 'default' : 'pointer' }}
                onClick={() => {
                  if (isParticipant) return; // participants stay in the flow
                  setCurrent(null); setState(null); setView('home');
                }}>Elenchus</span>
          <span style={{ color: 'var(--text-dim)', fontSize: fs(11), fontFamily: 'var(--sans)' }}>{s.name || current}</span>
          {isParticipant && studySession?.state === 'tutorial' && (
            <span style={{
              fontSize: fs(10), letterSpacing: 1, fontFamily: 'var(--mono)',
              color: 'var(--tension)', border: '1px solid var(--tension-border)',
              background: 'var(--tension-bg)', borderRadius: 4, padding: '2px 8px',
            }}>TUTORIAL — PRACTICE TOPIC</span>
          )}
          {isParticipant && studySession?.state === 'active' && (
            <span style={{
              fontSize: fs(10), letterSpacing: 1, fontFamily: 'var(--mono)',
              color: 'var(--commit)', border: '1px solid var(--commit-border)',
              background: 'var(--commit-bg)', borderRadius: 4, padding: '2px 8px',
            }}>MAIN TASK</span>
          )}
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          {isParticipant && studySession?.state === 'tutorial' && (
            <button onClick={studyBeginTask} disabled={studyBusy} style={{
              background: 'var(--accent)', border: 'none', borderRadius: 4,
              color: '#111', cursor: studyBusy ? 'default' : 'pointer',
              fontSize: fs(10), padding: '3px 10px', lineHeight: 1.4,
              letterSpacing: 1, fontFamily: 'var(--mono)', fontWeight: 500,
              opacity: studyBusy ? 0.5 : 1,
            }}>START THE MAIN TASK</button>
          )}
          {isParticipant && studySession?.state === 'active' && (
            <button onClick={() => {
              if (confirm('Finish the session? You will not be able to return to the task.')) {
                studyAdvance('post_session');
              }
            }} disabled={studyBusy} style={{
              background: 'none', border: '1px solid var(--accent)', borderRadius: 4,
              color: 'var(--accent)', cursor: studyBusy ? 'default' : 'pointer',
              fontSize: fs(10), padding: '3px 10px', lineHeight: 1.4,
              letterSpacing: 1, fontFamily: 'var(--mono)',
              opacity: studyBusy ? 0.5 : 1,
            }}>FINISH SESSION</button>
          )}
          {!isBaseline && (
          <button
            onClick={() => setLeftVisible(v => !v)}
            title={leftVisible ? 'Hide position pane' : 'Show position pane'}
            style={{
              background: leftVisible ? 'var(--surface)' : 'none',
              border: '1px solid var(--border)', borderRadius: 4,
              color: 'var(--text-muted)', cursor: 'pointer',
              fontSize: fs(10), padding: '2px 8px', lineHeight: 1.4,
              letterSpacing: 1, fontFamily: 'var(--mono)', outline: 'none',
            }}
          >POSITION C:{s.commitments.length} D:{s.denials.length}</button>
          )}
          {!isBaseline && (
          <button
            onClick={() => setRightVisible(v => !v)}
            title={rightVisible ? 'Hide sequents pane' : 'Show sequents pane'}
            style={{
              background: rightVisible ? 'var(--surface)' : 'none',
              border: '1px solid var(--border)', borderRadius: 4,
              color: 'var(--text-muted)', cursor: 'pointer',
              fontSize: fs(10), padding: '2px 8px', lineHeight: 1.4,
              letterSpacing: 1, fontFamily: 'var(--mono)', outline: 'none',
            }}
          >SEQUENTS T:{openTensionCount} I:{s.implications.length}</button>
          )}
          {!isParticipant && (
          <button
            onClick={async () => {
              setPdfLoading(true);
              try {
                const res = await fetch(`${API}/api/dialectics/${encodeURIComponent(current)}/report.pdf`);
                if (!res.ok) {
                  const err = await res.json().catch(() => ({ detail: res.statusText }));
                  throw new Error(err.detail || res.statusText);
                }
                const blob = await res.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${current} - Elenchus Report.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
              } catch (e) {
                setMessages(prev => [...prev, { role: 'error', content: `PDF generation failed: ${e.message}` }]);
              }
              setPdfLoading(false);
            }}
            disabled={pdfLoading}
            title="Download PDF report"
            style={{
              background: 'none', border: '1px solid var(--border)', borderRadius: 4,
              color: 'var(--text-muted)',
              cursor: pdfLoading ? 'default' : 'pointer', fontSize: fs(10),
              padding: '2px 8px', lineHeight: 1.4, letterSpacing: 1,
              fontFamily: 'var(--mono)', outline: 'none',
              animation: pdfLoading ? 'pdf-pulse 1.4s ease-in-out infinite' : 'none',
            }}
          >PDF</button>
          )}
          {actor && actor.kind === 'admin' && (
            <button
              onClick={() => { setCurrent(null); setState(null); setView('admin'); }}
              title="Admin dashboard"
              style={{
                background: 'none', border: '1px solid var(--accent)', borderRadius: 4,
                color: 'var(--accent)', cursor: 'pointer',
                fontSize: fs(10), padding: '2px 8px', lineHeight: 1.4,
                letterSpacing: 1, fontFamily: 'var(--mono)', outline: 'none',
              }}
            >ADMIN</button>
          )}
          {actor && (
            <span title={actor.email || ''} style={{
              fontSize: fs(10), color: 'var(--text-muted)', fontFamily: 'var(--sans)',
              marginLeft: 4, marginRight: 2,
            }}>
              {actor.display_name || actor.email}
              {actor.kind === 'admin' && (
                <span style={{ marginLeft: 4, color: 'var(--accent)' }}>·admin</span>
              )}
            </span>
          )}
          {actor && !isParticipant && (
            <button
              onClick={logout}
              title="Sign out"
              style={{
                background: 'none', border: '1px solid var(--border)', borderRadius: 4,
                color: 'var(--text-muted)', cursor: 'pointer',
                fontSize: fs(10), padding: '2px 8px', lineHeight: 1.4,
                letterSpacing: 1, fontFamily: 'var(--mono)',
              }}
            >SIGN OUT</button>
          )}
          {!isParticipant && (
          <button
            onClick={openSettingsPanel}
            title="Settings"
            style={{
              background: 'none', border: 'none', color: 'var(--text-muted)',
              cursor: 'pointer', fontSize: fs(14), padding: 2, lineHeight: 1,
            }}
          >&#9881;</button>
          )}
        </div>
      </div>

      {/* Left: Position */}
      {leftVisible && (
        <div style={{ padding: 14, overflowY: 'auto' }}>
          <PositionList title="Commitments" color="var(--commit)" bgColor="var(--commit-bg)" items={s.commitments} onRetract={retractProp} loading={loading} fs={fs} atomIds={s.atom_ids} />
          <PositionList title="Denials" color="var(--deny)" bgColor="var(--deny-bg)" items={s.denials} onRetract={retractProp} loading={loading} fs={fs} atomIds={s.atom_ids} />
          {s.retracted?.length > 0 && (
            <div style={{ marginBottom: 16 }}>
              <div style={{ fontSize: fs(9), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 6, textTransform: 'uppercase' }}>
                Retracted
              </div>
              {s.retracted.map((p, i) => {
                const aid = s.atom_ids && s.atom_ids[p];
                return (
                  <div key={i} style={{
                    padding: '3px 7px', marginBottom: 3, borderRadius: 3,
                    fontSize: fs(10), lineHeight: 1.5, fontFamily: 'var(--sans)',
                    color: 'var(--text-muted)', textDecoration: 'line-through',
                  }}>
                    {aid && <span style={{ fontSize: fs(8), marginRight: 4, fontFamily: 'var(--mono)', textDecoration: 'none', display: 'inline' }}>P{aid}</span>}
                    {p}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* Left drag handle */}
      {leftVisible && (
        <div onMouseDown={startDrag('left')} style={{
          cursor: 'col-resize', background: 'var(--border)', width: 4,
          transition: 'background 0.15s',
        }} onMouseEnter={e => e.currentTarget.style.background = 'var(--border-focus)'}
           onMouseLeave={e => e.currentTarget.style.background = 'var(--border)'} />
      )}

      {/* Center: Messages */}
      <div style={{ overflowY: 'auto', padding: '16px 24px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {messages.map((msg, i) => <Message key={i} msg={msg} fs={fs} />)}
        {loading && (
          <div style={{ color: 'var(--text-muted)', fontSize: fs(12), fontStyle: 'italic', padding: '8px 0' }}>
            Opponent is considering...
          </div>
        )}
        <div ref={msgEnd} />
      </div>

      {/* Right drag handle */}
      {rightVisible && (
        <div onMouseDown={startDrag('right')} style={{
          cursor: 'col-resize', background: 'var(--border)', width: 4,
          transition: 'background 0.15s',
        }} onMouseEnter={e => e.currentTarget.style.background = 'var(--border-focus)'}
           onMouseLeave={e => e.currentTarget.style.background = 'var(--border)'} />
      )}

      {/* Right: Sequents (focal tension only; rest are queued) */}
      {rightVisible && (
        <div style={{ padding: 14, overflowY: 'auto' }}>
          <div style={{ fontSize: fs(9), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 8, textTransform: 'uppercase' }}>
            Sequents
          </div>
          {s.tensions.length === 0 && s.implications.length === 0 && (
            <div style={{ color: 'var(--text-muted)', fontSize: fs(11), fontStyle: 'italic' }}>No sequents yet</div>
          )}
          {s.tensions.map(t => (
            <SequentCard key={'t'+t.id} item={t} type="tension" onAccept={() => acceptTension(t)} onContest={() => contestTension(t)} loading={loading} fs={fs} atomIds={s.atom_ids} />
          ))}
          {queuedTensions.length > 0 && (
            <div style={{
              padding: '6px 10px', marginBottom: 10, borderRadius: 4,
              border: '1px dashed var(--border)',
              fontSize: fs(10), color: 'var(--text-muted)', fontFamily: 'var(--sans)',
              fontStyle: 'italic',
            }}>
              {queuedTensions.length} more tension{queuedTensions.length === 1 ? '' : 's'} queued — surface after this one resolves
            </div>
          )}
          {s.implications.map((imp, i) => (
            <SequentCard key={'i'+i} item={imp} type="implication" loading={loading} fs={fs} atomIds={s.atom_ids} />
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{
        gridColumn: '1 / -1', padding: '12px 20px',
        borderTop: '1px solid var(--border)',
        display: 'flex', gap: 10, alignItems: 'flex-end',
      }}>
        <textarea
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={handleKey}
          disabled={loading}
          placeholder="Speak naturally — commit, deny, respond to tensions, refine your position..."
          rows={2}
          style={{
            flex: 1, padding: '10px 14px', background: 'var(--surface)',
            border: '1px solid var(--border)', borderRadius: 6,
            color: 'var(--text)', fontSize: fs(13), outline: 'none', resize: 'none',
            fontFamily: 'var(--sans)', lineHeight: 1.6,
          }}
        />
        <button
          onClick={() => sendMessage(input)}
          disabled={!input.trim() || loading}
          style={{
            padding: '10px 20px', height: 44,
            background: input.trim() && !loading ? 'var(--accent)' : 'var(--surface2)',
            border: 'none', borderRadius: 6,
            color: input.trim() && !loading ? '#111' : 'var(--text-muted)',
            fontSize: fs(12), cursor: input.trim() ? 'pointer' : 'default',
            letterSpacing: 1, fontWeight: 500, flexShrink: 0,
          }}
        >{loading ? '...' : 'SEND'}</button>
      </div>

      {settingsModal}
    </div>
  );
}

// ── Components ──

function PositionList({ title, color, bgColor, items, onRetract, loading, fs, atomIds }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ fontSize: fs(9), letterSpacing: 2, color, marginBottom: 6, textTransform: 'uppercase' }}>
        {title}
      </div>
      {items.length === 0 && (
        <div style={{ color: 'var(--text-muted)', fontSize: fs(11), fontStyle: 'italic' }}>∅</div>
      )}
      {items.map((p, i) => {
        const aid = atomIds && atomIds[p];
        return (
          <div key={i} style={{
            padding: '4px 7px', marginBottom: 3, borderRadius: 3,
            background: bgColor,
            borderLeft: `2px solid ${color}`,
            display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
            fontSize: fs(10), lineHeight: 1.5, gap: 4, fontFamily: 'var(--sans)',
          }}>
            <span style={{ wordBreak: 'break-word' }}>
              {aid && <span style={{ color: 'var(--text-muted)', fontSize: fs(8), marginRight: 4, fontFamily: 'var(--mono)' }}>P{aid}</span>}
              {p}
            </span>
            <button onClick={() => onRetract(p)} disabled={loading} style={{
              background: 'none', border: 'none', color: 'var(--text-muted)',
              cursor: loading ? 'default' : 'pointer', fontSize: fs(9), padding: '0 2px', flexShrink: 0, lineHeight: 1,
              opacity: loading ? 0.3 : 1,
            }} title="Retract">×</button>
          </div>
        );
      })}
    </div>
  );
}

function SequentCard({ item, type, onAccept, onContest, loading, fs, atomIds }) {
  const isTension = type === 'tension';
  const color = isTension ? 'var(--tension)' : 'var(--imp)';
  const bg = isTension ? 'var(--tension-bg)' : 'var(--imp-bg)';
  const border = isTension ? 'var(--tension-border)' : 'var(--imp-border)';
  const atomBg = isTension ? 'rgba(250,204,21,0.12)' : 'rgba(96,165,250,0.12)';

  return (
    <div style={{
      marginBottom: 8, borderRadius: 6,
      background: bg, border: `1px solid ${border}`,
      overflow: 'hidden',
    }}>
      <div style={{
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        padding: '3px 8px',
        borderBottom: `1px solid ${border}`,
      }}>
        <span style={{ fontSize: fs(8), fontFamily: 'var(--mono)', color: 'var(--text-muted)' }}>
          {isTension ? `T${item.id}` : `I${item.id}`}
        </span>
        {isTension && (
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={onAccept} disabled={loading} title="Accept"
              style={{
                background: 'none', border: 'none', color: 'var(--commit)',
                cursor: loading ? 'default' : 'pointer', fontSize: fs(13), padding: 0, lineHeight: 1,
                opacity: loading ? 0.3 : 0.8,
              }}
            >&#9744;</button>
            <button onClick={onContest} disabled={loading} title="Contest"
              style={{
                background: 'none', border: 'none', color: 'var(--text-muted)',
                cursor: loading ? 'default' : 'pointer', fontSize: fs(12), padding: 0, lineHeight: 1,
                opacity: loading ? 0.3 : 0.8,
              }}
            >&times;</button>
          </div>
        )}
      </div>
      <div style={{ padding: 8 }}>
        {item.gamma.map((g, i) => {
          const aid = atomIds && atomIds[g];
          return (
            <div key={'g'+i} style={{
              padding: '2px 6px', marginBottom: 3, borderRadius: 3,
              background: atomBg, fontSize: fs(9.5), lineHeight: 1.5,
              fontFamily: 'var(--sans)', color: 'var(--text-dim)',
              display: 'flex', alignItems: 'baseline', gap: 4,
            }}>
              {aid && <span style={{ fontSize: fs(7.5), fontFamily: 'var(--mono)', color: 'var(--text-muted)', flexShrink: 0 }}>P{aid}</span>}
              <span>{g}</span>
            </div>
          );
        })}
        <div style={{
          height: 2, background: color,
          margin: '6px 0', borderRadius: 1,
        }} />
        {item.delta.map((d, i) => {
          const aid = atomIds && atomIds[d];
          return (
            <div key={'d'+i} style={{
              padding: '2px 6px', marginBottom: 3, borderRadius: 3,
              background: atomBg, fontSize: fs(9.5), lineHeight: 1.5,
              fontFamily: 'var(--sans)', color: 'var(--text-dim)',
              display: 'flex', alignItems: 'baseline', gap: 4,
            }}>
              {aid && <span style={{ fontSize: fs(7.5), fontFamily: 'var(--mono)', color: 'var(--text-muted)', flexShrink: 0 }}>P{aid}</span>}
              <span>{d}</span>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function Message({ msg, fs }) {
  if (msg.role === 'system' || msg.role === 'error') {
    return (
      <div style={{
        fontSize: fs(11), padding: '4px 0', textAlign: 'center', fontStyle: 'italic',
        color: msg.role === 'error' ? '#ef4444' : 'var(--text-muted)',
      }}>{msg.content}</div>
    );
  }

  const isOpp = msg.role === 'opponent';
  return (
    <div style={{ display: 'flex', justifyContent: isOpp ? 'flex-start' : 'flex-end' }}>
      <div style={{
        maxWidth: '82%', padding: '10px 14px', borderRadius: 10,
        background: isOpp ? 'var(--opp-bg)' : 'var(--surface2)',
        border: `1px solid ${isOpp ? 'var(--opp-border)' : 'var(--border)'}`,
        fontFamily: 'var(--sans)',
      }}>
        <div style={{
          fontSize: fs(9), marginBottom: 4, letterSpacing: 1, textTransform: 'uppercase',
          fontFamily: 'var(--mono)',
          color: isOpp ? 'var(--opp)' : 'var(--text-muted)',
        }}>{isOpp ? 'Opponent' : 'Respondent'}</div>
        {isOpp ? (
          <div className="msg-md" style={{
            fontSize: fs(13), lineHeight: 1.7,
            color: 'var(--text)',
          }} dangerouslySetInnerHTML={{ __html: marked.parse(msg.content || '') }} />
        ) : (
          <div style={{
            fontSize: fs(13), lineHeight: 1.7, whiteSpace: 'pre-wrap',
            color: 'var(--respondent-text)',
          }}>{msg.content}</div>
        )}
      </div>
    </div>
  );
}

// ── Admin Dashboard ──
//
// Two-tab view for admins: Invites (issue / list / revoke) and Users
// (list, read-only for Phase A). Mounted in App when view==='admin'.
// Non-admins shouldn't be able to reach this (the route is hidden in
// the home header), but the component also defends: the backend
// returns 403 for non-admins and we surface that as an error banner.

function AdminInvitesTab({ fs }) {
  const [invites, setInvites] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [form, setForm] = useState({ role: 'user', intended_email: '' });
  const [creating, setCreating] = useState(false);
  const [lastIssued, setLastIssued] = useState(null);

  const load = async () => {
    setLoading(true); setError(null);
    try {
      const data = await api('/api/admin/invites');
      setInvites(data.invites || []);
    } catch (e) { setError(e.message); }
    setLoading(false);
  };
  useEffect(() => { load(); }, []);

  const issue = async () => {
    if (!form.role || creating) return;
    setCreating(true); setError(null);
    try {
      const body = { role: form.role };
      if (form.intended_email) body.intended_email = form.intended_email;
      const res = await api('/api/admin/invites', {
        method: 'POST', body: JSON.stringify(body),
      });
      setLastIssued(res);
      setForm({ role: 'user', intended_email: '' });
      await load();
    } catch (e) { setError(e.message); }
    setCreating(false);
  };

  const revoke = async (token) => {
    if (!confirm('Revoke this invite? It cannot be undone.')) return;
    try {
      await api(`/api/admin/invites/${encodeURIComponent(token)}`, { method: 'DELETE' });
      await load();
    } catch (e) { setError(e.message); }
  };

  const inviteUrl = (token) => `${window.location.origin}/?token=${encodeURIComponent(token)}`;

  return (
    <div>
      {/* Create form */}
      <div style={{
        marginBottom: 24, padding: 16, borderRadius: 6,
        background: 'var(--surface)', border: '1px solid var(--border)',
      }}>
        <div style={{ fontSize: fs(10), letterSpacing: 2, color: 'var(--text-muted)', marginBottom: 10 }}>
          ISSUE INVITE
        </div>
        <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
          <select
            value={form.role}
            onChange={e => setForm(f => ({ ...f, role: e.target.value }))}
            style={{
              padding: '8px 10px', background: 'var(--surface2)',
              border: '1px solid var(--border)', borderRadius: 4,
              color: 'var(--text)', fontSize: fs(12), fontFamily: 'var(--sans)',
            }}
          >
            <option value="user">user</option>
            <option value="researcher">researcher</option>
            <option value="judge">judge</option>
            <option value="admin">admin</option>
          </select>
          <input
            value={form.intended_email}
            onChange={e => setForm(f => ({ ...f, intended_email: e.target.value }))}
            placeholder="recipient email (optional)"
            style={{
              flex: 1, padding: '8px 10px', background: 'var(--surface2)',
              border: '1px solid var(--border)', borderRadius: 4,
              color: 'var(--text)', fontSize: fs(12), fontFamily: 'var(--sans)',
              outline: 'none',
            }}
          />
          <button
            onClick={issue} disabled={creating}
            style={{
              padding: '8px 16px', background: 'var(--accent)',
              border: 'none', borderRadius: 4, color: '#111',
              fontSize: fs(11), letterSpacing: 1, fontWeight: 500,
              cursor: creating ? 'default' : 'pointer', opacity: creating ? 0.5 : 1,
            }}
          >{creating ? '…' : 'ISSUE'}</button>
        </div>
        {lastIssued && (
          <div style={{
